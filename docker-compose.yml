services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: domiq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: python:3.14-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/domiq
      REDIS_URL: redis://redis:6379
      SECRET_KEY: domiq-dev-secret-key-change-in-production
      S3_BUCKET_NAME: ""
      S3_ACCESS_KEY: ""
      S3_SECRET_KEY: ""
      S3_ENDPOINT_URL: ""
    command: >
      bash -c "pip install -q alembic psycopg2-binary 'sqlalchemy>=2' 'pydantic>=2' pydantic-settings &&
               alembic upgrade head"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

volumes:
  postgres_data:
