services:
  # ── FastAPI Web Service ──────────────────────────────────────────────────────
  - type: web
    name: domiq-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Запускаем миграции перед каждым деплоем (asyncpg, без psycopg2)
    preDeployCommand: alembic upgrade head
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false          # задаётся вручную в Render Dashboard (Neon)
      - key: REDIS_URL
        sync: false          # задаётся вручную в Render Dashboard (Upstash)
      - key: SECRET_KEY
        generateValue: true  # Render сгенерирует случайное значение
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false          # например: https://domiq.vercel.app,http://localhost:3000

  # ── Celery Background Worker ─────────────────────────────────────────────────
  - type: worker
    name: domiq-celery
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A core.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        fromService:
          type: web
          name: domiq-api
          envVarKey: SECRET_KEY
      - key: ALGORITHM
        value: HS256
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: "http://localhost:3000"
