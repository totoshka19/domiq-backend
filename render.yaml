services:
  # ── FastAPI Web Service (Free tier) ──────────────────────────────────────────
  - type: web
    name: domiq-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    preDeployCommand: alembic upgrade head
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
